<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>DIAGEM Loyalty Simulator</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css"
    integrity="sha512-Tbd1nA1N0Rr3BqgQ3RDf+JxKOB8yDw8nYFSl6yHQa1rE0X7xt+6CxoX0nrV8It3SXZb+H1pIlLb8g1JQ5rKfug=="
    crossorigin="anonymous"
    referrerpolicy="no-referrer"
  />
</head>
<body class="p-3">
<div class="container-fluid">
  <h3 class="mb-3">DIAGEM Loyalty Simulation</h3>

  <!-- Step 1: Branch selection -->
  <div class="card mb-3">
    <div class="card-header">Step 1: Select Branch</div>
    <div class="card-body">
      <div class="row g-2">
        <div class="col-md-4">
          <label class="form-label">Branch</label>
          <select id="branchSelect" class="form-select" onchange="onBranchChange()">
            <option value="">-- Select Branch --</option>
          </select>
        </div>
      </div>
    </div>
  </div>

  <!-- Step 2: Dealer selection -->
  <div class="card mb-3">
    <div class="card-header">Step 2: Select Dealer</div>
    <div class="card-body">
      <div class="row g-2">
        <div class="col-md-4">
          <label class="form-label">Dealer Code</label>
          <input id="dealerCodeInput" type="text" class="form-control" placeholder="Enter dealer code">
        </div>
        <div class="col-md-4">
          <label class="form-label">Dealer Name (search)</label>
          <input id="dealerNameSearch" type="text" class="form-control" placeholder="Type to filter by name" oninput="filterDealerList()">
        </div>
        <div class="col-md-4">
          <label class="form-label">Dealer list (filtered by branch)</label>
          <select id="dealerList" class="form-select" onchange="onDealerSelectedFromList()">
            <option value="">-- Select Dealer --</option>
          </select>
        </div>
      </div>
      <div class="mt-3">
        <button class="btn btn-primary" onclick="fetchDealer()">Fetch Dealer</button>
        <span id="dealerFetchStatus" class="ms-2 text-muted"></span>
      </div>
    </div>
  </div>

  <!-- Dealer Details -->
  <div class="card mb-3">
    <div class="card-header">Dealer Details (from Master)</div>
    <div class="card-body" id="dealerSnapshot">
      <p class="text-muted mb-0">Select branch & dealer, then click "Fetch Dealer" to see details.</p>
    </div>
  </div>

  <!-- Step 3: Simulation Inputs -->
  <div class="card mb-3">
    <div class="card-header">Step 3: Simulation Inputs</div>
    <div class="card-body">
      <div class="row g-3">
        <div class="col-md-3">
          <label class="form-label">Projected CY Sales Turnover (Mn)</label>
          <input id="cySalesInput" type="number" step="0.01" class="form-control">
        </div>
        <div class="col-md-3">
          <label class="form-label">Projected CY Service Turnover (Mn)</label>
          <input id="cyServiceInput" type="number" step="0.01" class="form-control">
        </div>
        <div class="col-md-3">
          <label class="form-label">City Category</label>
          <select id="cityCategoryInput" class="form-select">
            <option value="A">A</option>
            <option value="B">B</option>
            <option value="C">C</option>
            <option value="D">D</option>
            <option value="E">E</option>
          </select>
        </div>
        <div class="col-md-3">
          <label class="form-label">Exclusivity</label>
          <select id="exclusivityInput" class="form-select">
            <option value="Yes">Yes</option>
            <option value="No">No</option>
          </select>
        </div>
      </div>

      <div class="row g-3 mt-2">
        <div class="col-md-3">
          <label class="form-label">Cheque Bouncing (current year)</label>
          <select id="chequeBounceInput" class="form-select">
            <option value="No">No</option>
            <option value="Yes">Yes</option>
          </select>
        </div>
      </div>

      <div class="mt-3">
        <button class="btn btn-success" onclick="runSimulation()">Calculate Simulation</button>
        <button class="btn btn-outline-secondary ms-2" onclick="resetInputs()">Reset Inputs</button>
        <span id="simulationStatus" class="ms-2 text-muted"></span>
      </div>
    </div>
  </div>

  <!-- Results -->
  <div class="card mb-3" id="resultCard" style="display:none;">
    <div class="card-header d-flex justify-content-between align-items-center">
      <span>Simulation Result</span>
      <button class="btn btn-sm btn-outline-primary" onclick="saveSimulation()">Save Simulation</button>
    </div>
    <div class="card-body">
      <div id="summaryPanel" class="mb-3"></div>
      <div class="table-responsive">
        <table class="table table-sm table-bordered align-middle">
          <thead class="table-light">
            <tr>
              <th>Parameter</th>
              <th>Weight</th>
              <th>Actual Value</th>
              <th>Rating</th>
              <th>Score</th>
            </tr>
          </thead>
          <tbody id="parameterTableBody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script>
  // === CONFIG ===
  const APPSCRIPT_URL = 'https://script.google.com/macros/s/AKfycbx5w680QVpwrN8tfPfjudIy1d9hDT6gvQ9vCGdWU05e_V29ULhQEk_ZofgHx-wvwT7v_Q/exec';

  // === GLOBAL STATE ===
  let branches = [];
  let dealersForBranch = [];
  let currentDealer = null;
  let lastSimulationPayload = null;
  let lastSimulationResult = null;

  // === API CALL HELPER ===
  async function callApi(action, payload = {}) {
    const body = { action, ...payload };
    const res = await fetch(APPSCRIPT_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    const json = await res.json();
    if (!json.success) {
      throw new Error(json.error || 'API error');
    }
    return json.data || json;
  }

  // === INITIAL LOAD ===
  document.addEventListener('DOMContentLoaded', async () => {
    try {
      branches = await callApi('getBranchList');
      const sel = document.getElementById('branchSelect');
      sel.innerHTML = '<option value="">-- Select Branch --</option>';
      branches.forEach(b => {
        const opt = document.createElement('option');
        opt.value = b;
        opt.textContent = b;
        sel.appendChild(opt);
      });
    } catch (e) {
      alert('Error loading branches: ' + e.message);
    }
  });

  // === BRANCH & DEALER SELECTION ===
  async function onBranchChange() {
    const branch = document.getElementById('branchSelect').value;
    currentDealer = null;
    dealersForBranch = [];
    document.getElementById('dealerCodeInput').value = '';
    document.getElementById('dealerNameSearch').value = '';
    document.getElementById('dealerList').innerHTML = '<option value="">-- Select Dealer --</option>';
    document.getElementById('dealerSnapshot').innerHTML =
      '<p class="text-muted mb-0">Select branch & dealer, then click "Fetch Dealer" to see details.</p>';

    if (!branch) return;

    try {
      dealersForBranch = await callApi('getDealersForBranch', { branch });
      populateDealerList(dealersForBranch);
    } catch (e) {
      alert('Error loading dealers: ' + e.message);
    }
  }

  function populateDealerList(list) {
    const sel = document.getElementById('dealerList');
    sel.innerHTML = '<option value="">-- Select Dealer --</option>';
    list.forEach(d => {
      const opt = document.createElement('option');
      opt.value = d.dealerCode;
      opt.textContent = `${d.dealerName} (${d.dealerCode})`;
      sel.appendChild(opt);
    });
  }

  function filterDealerList() {
    const term = document.getElementById('dealerNameSearch').value.toLowerCase();
    if (!term) {
      populateDealerList(dealersForBranch);
      return;
    }
    const filtered = dealersForBranch.filter(d =>
      d.dealerName.toLowerCase().includes(term) ||
      d.dealerCode.toLowerCase().includes(term)
    );
    populateDealerList(filtered);
  }

  function onDealerSelectedFromList() {
    const sel = document.getElementById('dealerList');
    const code = sel.value;
    if (code) {
      document.getElementById('dealerCodeInput').value = code;
    }
  }

  async function fetchDealer() {
    const branch = document.getElementById('branchSelect').value;
    const code = document.getElementById('dealerCodeInput').value.trim();

    if (!branch) {
      alert('Please select a branch first.');
      return;
    }
    if (!code) {
      alert('Please enter dealer code or select from list.');
      return;
    }

    document.getElementById('dealerFetchStatus').textContent = 'Loading...';

    try {
      const dealer = await callApi('getDealerByCode', { branch, dealerCode: code });
      currentDealer = dealer;
      document.getElementById('dealerFetchStatus').textContent = 'Loaded';
      renderDealerSnapshot(dealer);

      document.getElementById('cityCategoryInput').value = dealer.cityCategory || 'E';
      document.getElementById('exclusivityInput').value = dealer.defaultExclusivity || 'No';
      document.getElementById('chequeBounceInput').value = 'No';
      document.getElementById('cySalesInput').value = '';
      document.getElementById('cyServiceInput').value = '';
    } catch (e) {
      currentDealer = null;
      document.getElementById('dealerFetchStatus').textContent = 'Error';
      alert('Error fetching dealer: ' + e.message);
    }
  }

  function renderDealerSnapshot(dealer) {
    const div = document.getElementById('dealerSnapshot');
    const html = `
      <div class="row">
        <div class="col-md-4"><strong>Dealer Code:</strong> ${dealer.dealerCode}</div>
        <div class="col-md-4"><strong>Dealer Name:</strong> ${dealer.dealerName}</div>
        <div class="col-md-4"><strong>Branch:</strong> ${dealer.branch}</div>
      </div>
      <div class="row">
        <div class="col-md-4"><strong>City:</strong> ${dealer.city}</div>
        <div class="col-md-4"><strong>City Category:</strong> ${dealer.cityCategory}</div>
        <div class="col-md-4"><strong>Date of Joining:</strong> ${formatDate(dealer.dateOfJoining)}</div>
      </div>
      <div class="row">
        <div class="col-md-4"><strong>Years of Association:</strong> ${dealer.yearsOfAssociation}</div>
        <div class="col-md-4"><strong>LY Sales (Mn):</strong> ${dealer.lySales}</div>
        <div class="col-md-4"><strong>LY Service (Mn):</strong> ${dealer.lyService}</div>
      </div>
      <div class="row">
        <div class="col-md-4"><strong>LY Total (Mn):</strong> ${dealer.lyTotal}</div>
        <div class="col-md-4"><strong>Default Exclusivity:</strong> ${dealer.defaultExclusivity}</div>
      </div>
    `;
    div.innerHTML = html;
  }

  function formatDate(val) {
    if (!val) return '';
    const d = new Date(val);
    if (isNaN(d.getTime())) return val;
    const dd = String(d.getDate()).padStart(2, '0');
    const mm = String(d.getMonth() + 1).padStart(2, '0');
    const yyyy = d.getFullYear();
    return `${dd}-${mm}-${yyyy}`;
  }

  function resetInputs() {
    document.getElementById('cySalesInput').value = '';
    document.getElementById('cyServiceInput').value = '';
    document.getElementById('chequeBounceInput').value = 'No';
    if (currentDealer) {
      document.getElementById('cityCategoryInput').value = currentDealer.cityCategory || 'E';
      document.getElementById('exclusivityInput').value = currentDealer.defaultExclusivity || 'No';
    } else {
      document.getElementById('cityCategoryInput').value = 'E';
      document.getElementById('exclusivityInput').value = 'No';
    }
    document.getElementById('simulationStatus').textContent = '';
  }

  // === SIMULATION ===
  async function runSimulation() {
    if (!currentDealer) {
      alert('Please fetch a dealer first.');
      return;
    }

    const cySales   = parseFloat(document.getElementById('cySalesInput').value || '0');
    const cyService = parseFloat(document.getElementById('cyServiceInput').value || '0');
    const cityCat   = document.getElementById('cityCategoryInput').value;
    const exclusivity = document.getElementById('exclusivityInput').value;
    const cheque      = document.getElementById('chequeBounceInput').value;

    if (cySales <= 0 && cyService <= 0) {
      alert('Please enter projected CY Sales and/or Service turnover.');
      return;
    }

    const payload = {
      dealerCode: currentDealer.dealerCode,
      dealerName: currentDealer.dealerName,
      branch: currentDealer.branch,
      city: currentDealer.city,
      lySales: currentDealer.lySales,
      lyService: currentDealer.lyService,
      yearsOfAssociation: currentDealer.yearsOfAssociation,
      cityCategory: cityCat,
      cySales: cySales,
      cyService: cyService,
      exclusivity: exclusivity,
      chequeBounce: cheque
    };

    document.getElementById('simulationStatus').textContent = 'Calculating...';

    try {
      const result = await callApi('calculateSimulation', { payload });
      lastSimulationPayload = payload;
      lastSimulationResult  = result;
      document.getElementById('simulationStatus').textContent = 'Done';
      renderSimulationResult(result);
    } catch (e) {
      document.getElementById('simulationStatus').textContent = 'Error';
      alert('Error in simulation: ' + e.message);
    }
  }

  function renderSimulationResult(result) {
    const resultCard = document.getElementById('resultCard');
    const summaryDiv = document.getElementById('summaryPanel');
    const tbody = document.getElementById('parameterTableBody');

    const bonusPct = result.bonusPercent || 0;
    const recogPct = result.recognitionPercent || 0;

    summaryDiv.innerHTML = `
      <div class="row mb-2">
        <div class="col-md-3"><strong>Total Points:</strong> ${result.totalPoints.toFixed(2)}</div>
        <div class="col-md-3"><strong>Club:</strong> ${result.clubName}</div>
        <div class="col-md-3"><strong>Total CY Turnover (Mn):</strong> ${result.totalCyTurnover.toFixed(2)}</div>
      </div>
      <div class="row mb-2">
        <div class="col-md-3"><strong>Bonus %:</strong> ${bonusPct}%</div>
        <div class="col-md-3"><strong>Bonus Amount (Mn):</strong> ${result.bonusAmount.toFixed(2)}</div>
        <div class="col-md-3"><strong>Recognition %:</strong> ${recogPct}%</div>
        <div class="col-md-3"><strong>Recognition Amount (Mn):</strong> ${result.recognitionAmount.toFixed(2)}</div>
      </div>
    `;

    tbody.innerHTML = '';
    (result.parameters || []).forEach(p => {
      const tr = document.createElement('tr');
      const valText = (typeof p.value === 'number') ? p.value.toFixed(2) : p.value;
      tr.innerHTML = `
        <td>${p.parameter}</td>
        <td>${p.weight}</td>
        <td>${valText}</td>
        <td>${p.rating}</td>
        <td>${p.score.toFixed(2)}</td>
      `;
      tbody.appendChild(tr);
    });

    resultCard.style.display = 'block';
  }

  // === SAVE SIMULATION ===
  async function saveSimulation() {
    if (!lastSimulationPayload || !lastSimulationResult) {
      alert('Run a simulation first before saving.');
      return;
    }

    try {
      await callApi('logSimulation', {
        payload: lastSimulationPayload,
        result: lastSimulationResult
      });
      alert('Simulation saved to log.');
    } catch (e) {
      alert('Error saving simulation: ' + e.message);
    }
  }
</script>
</body>
</html>
